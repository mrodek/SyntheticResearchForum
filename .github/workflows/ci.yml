name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check src/ tests/ scripts/ skills/

      - name: Run unit tests
        run: python -m pytest tests/unit -v --tb=short

      - name: Validate prompts (dry-run)
        run: python scripts/validate_prompts.py --dry-run
